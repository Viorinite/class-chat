name: class-chat

services:
  app:
    build: .
    container_name: class-chat-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ROOM_PASSWORD=${ROOM_PASSWORD}
    networks:
      - school-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: class-chat-cloudflared
    profiles:
      - tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - school-net

networks:
  school-net:
    driver: bridge
